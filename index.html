<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クリニック呼び出しシステム</title>
    <style>
        /* 1. 基本・全体のスタイル */
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; user-select: none; }
        
        /* 2. レイアウト（横画面・テレビ最適化） */
        .main-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .current-call-area { flex: 1; background-color: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 320px; }
        .title { font-size: 24px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; }
        .current-number { font-size: 120px; font-weight: bold; color: #e74c3c; margin: 0; line-height: 1.2; }
        
        /* 3. 情報エリア（お知らせ・待ち時間） */
        .info-area { width: 350px; display: flex; flex-direction: column; gap: 20px; }
        .message-box, .wait-time-box { background-color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .message-text { font-size: 22px; font-weight: bold; color: #2c3e50; margin: 5px 0 0 0; }
        .wait-time { font-size: 40px; font-weight: bold; color: #2980b9; margin: 10px 0 0 0; }

        /* 戻すボタンのスタイル */
        .return-btn { background-color: #7f8c8d; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .return-btn:hover { background-color: #616a6b; }
        
        /* 4. 待ち番号リストエリア */
        .waiting-list-area { background-color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; min-height: 180px; }
        .waiting-numbers { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; min-height: 80px; }
        .waiting-ticket { background-color: #ecf0f1; color: #2c3e50; font-size: 30px; font-weight: bold; padding: 15px 30px; border-radius: 8px; cursor: move; border: 2px solid #bdc3c7; transition: transform 0.1s; }
        .waiting-ticket:hover { border-color: #2980b9; transform: scale(1.02); }
        .waiting-ticket.dragging { opacity: 0.4; background-color: #3498db; color: white; }

        /* 5. 下部テロップエリア */
        .marquee-area { background-color: #34495e; color: white; padding: 15px; font-size: 24px; border-radius: 8px; }
        .typing-indicator { position: fixed; bottom: 18px; right: 20px; color: rgba(255, 255, 255, 0.4); font-size: 18px; font-weight: bold; z-index: 100; pointer-events: none; }
        
        /* 6. 設定モーダル（Sキー） */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 5000; }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 450px; border-radius: 16px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); }
        .setting-item { margin-bottom: 20px; }
        .setting-item label { font-weight: bold; display: block; margin-bottom: 5px; }
        .setting-item input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        .save-btn { background-color: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }

        /* 7. フローティングテンキー（右上ダブルタップ） */
        #numpad { display: none; position: fixed; top: 120px; left: 120px; background: rgba(255,255,255,0.98); padding: 20px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 4000; border: 2px solid #bdc3c7; }
        .numpad-header { background: #34495e; color: white; padding: 8px; margin: -20px -20px 15px -20px; border-top-left-radius: 14px; border-top-right-radius: 14px; font-size: 14px; font-weight: bold; text-align: center; cursor: move; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; }
        .numpad button { height: 55px; border: none; border-radius: 8px; background: #95a5a6; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        .numpad button:active { background: #7f8c8d; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="current-call-area">
        <div class="title">ただいまのお呼出番号</div>
        <div class="current-number" id="currentNumber">000</div>
        <div>
            <button class="return-btn" onclick="returnToQueue()">呼び出しをリストに戻す</button>
        </div>
    </div>
    <div class="info-area">
        <div class="message-box">
            <p class="title">お知らせ</p>
            <p class="message-text" id="displayMsg">待合室でお待ちください</p>
        </div>
        <div class="wait-time-box">
            <p class="title">およその待ち時間</p>
            <p class="wait-time"><span id="waitTime">0</span> 分</p>
        </div>
    </div>
</div>

<div class="waiting-list-area">
    <div class="title">お待ちの番号（タッチで呼び出し / ドラッグで並び替え）</div>
    <div class="waiting-numbers" id="waitingList"></div>
</div>

<div class="marquee-area">
    <marquee id="marqueeText">まつい整形外科せぼね・関節クリニックへようこそ。</marquee>
</div>

<div style="position:fixed; top:0; right:0; width:120px; height:120px; z-index:4500; cursor:pointer;" ondblclick="toggleNumpad()"></div>

<div id="numpad">
    <div class="numpad-header" id="numpadHeader">◀ テンキー (ドラッグで移動) ▶</div>
    <div class="numpad-grid">
        <button onclick="inputNum('1')">1</button><button onclick="inputNum('2')">2</button><button onclick="inputNum('3')">3</button>
        <button onclick="inputNum('4')">4</button><button onclick="inputNum('5')">5</button><button onclick="inputNum('6')">6</button>
        <button onclick="inputNum('7')">7</button><button onclick="inputNum('8')">8</button><button onclick="inputNum('9')">9</button>
        <button onclick="inputNum('0')">0</button>
        <button onclick="clearBuffer()" style="background:#e74c3c;">C</button>
        <button onclick="addToList()" style="background:#2ecc71;">追加</button>
        <button onclick="deleteFromList()" style="background:#e67e22; font-size:16px;">削除</button>
    </div>
    <p style="text-align:center; margin:10px 0 0 0; color:#7f8c8d; font-size:12px; cursor:pointer;" onclick="toggleNumpad()">【閉じる】</p>
</div>

<div id="settingModal" class="modal">
    <div class="modal-content">
        <h2>システム設定 (Escで閉じる)</h2>
        <div class="setting-item">
            <label>1人あたりの待ち時間 (分):</label>
            <input type="number" id="inputWaitTime" value="5">
        </div>
        <div class="setting-item">
            <label>お知らせ文言:</label>
            <input type="text" id="inputMsg" value="待合室でお待ちください">
        </div>
        <div class="setting-item">
            <label>下部流れるテロップ内容:</label>
            <input type="text" id="inputMarquee" value="まつい整形外科せぼね・関節クリニックへようこそ。本日はMRI検査等で順番が前後する場合がございます。あらかじめご了承ください。">
        </div>
        <button class="save-btn" onclick="saveSettings()">設定を保存して適用</button>
    </div>
</div>

<div id="typingIndicator" class="typing-indicator"></div>

<script>
    let waitingQueue = [];
    let inputBuffer = "";
    let currentCall = "000";
    
    // ローカルストレージから設定取得、または初期値
    let config = JSON.parse(localStorage.getItem('clinicConfig')) || { 
        time: 5, 
        msg: "待合室でお待ちください", 
        marquee: "まつい整形外科せぼね・関節クリニックへようこそ。本日はMRI検査等で順番が前後する場合がございます。あらかじめご了承ください。" 
    };

    // 設定の反映
    function applyConfig() {
        document.getElementById('marqueeText').innerText = config.marquee;
        document.getElementById('displayMsg').innerText = config.msg;
        document.getElementById('inputWaitTime').value = config.time;
        document.getElementById('inputMsg').value = config.msg;
        document.getElementById('inputMarquee').value = config.marquee;
        updateDisplay();
    }

    function saveSettings() {
        config.time = parseInt(document.getElementById('inputWaitTime').value) || 5;
        config.msg = document.getElementById('inputMsg').value;
        config.marquee = document.getElementById('inputMarquee').value;
        localStorage.setItem('clinicConfig', JSON.stringify(config));
        applyConfig();
        document.getElementById('settingModal').style.display = 'none';
    }

    // テンキー入力処理（常に最新の3桁を維持）
    function inputNum(n) {
        inputBuffer = (inputBuffer + n);
        if (inputBuffer.length > 3) {
            inputBuffer = inputBuffer.slice(-3);
        }
        updateDisplay();
    }

    function clearBuffer() {
        inputBuffer = "";
        updateDisplay();
    }

    // 3桁固定フォーマット関数
    function padZero(numStr) {
        return numStr.padStart(3, '0');
    }

    function addToList() {
        if (inputBuffer !== "") {
            let targetNum = padZero(inputBuffer);
            if (!waitingQueue.includes(targetNum)) {
                waitingQueue.push(targetNum);
            }
            inputBuffer = "";
            updateDisplay();
        }
    }

    function deleteFromList() {
        if (inputBuffer !== "") {
            let targetNum = padZero(inputBuffer);
            waitingQueue = waitingQueue.filter(n => n !== targetNum);
            inputBuffer = "";
            updateDisplay();
        }
    }

    function returnToQueue() {
        if (currentCall !== "000") {
            waitingQueue.unshift(currentCall);
            currentCall = "000";
            document.getElementById('currentNumber').innerText = currentCall;
            updateDisplay();
        }
    }

    function callNumber(num) {
        currentCall = num;
        document.getElementById('currentNumber').innerText = currentCall;
        waitingQueue = waitingQueue.filter(n => n !== num);
        playChime();
        updateDisplay();
    }

    function callNextNumber() {
        if (waitingQueue.length > 0) {
            callNumber(waitingQueue[0]);
        }
    }

    // 画面表示更新とドラッグ＆ドロップ並び替えの統合
    function updateDisplay() {
        const container = document.getElementById('waitingList');
        container.innerHTML = '';
        
        waitingQueue.forEach(num => {
            const ticket = document.createElement('div');
            ticket.className = 'waiting-ticket';
            ticket.innerText = num;
            ticket.draggable = true;
            
            // タッチ/クリックで直接呼び出し
            ticket.onclick = () => callNumber(num);

            // ドラッグイベントの付与
            ticket.addEventListener('dragstart', () => { ticket.classList.add('dragging'); });
            ticket.addEventListener('dragend', () => { ticket.classList.remove('dragging'); buildQueueFromDOM(); });

            container.appendChild(ticket);
        });

        // 待ち時間計算
        document.getElementById('waitTime').innerText = waitingQueue.length * config.time;
        // 入力バッファ表示
        document.getElementById('typingIndicator').innerText = inputBuffer !== "" ? "入力中: " + padZero(inputBuffer) : "";
    }

    // ドラッグドロップによる並び替えのロジック
    const listContainer = document.getElementById('waitingList');
    listContainer.addEventListener('dragover', e => {
        e.preventDefault();
        const afterElement = getDragAfterElement(listContainer, e.clientX);
        const dragging = document.querySelector('.dragging');
        if (afterElement == null) {
            listContainer.appendChild(dragging);
        } else {
            listContainer.insertBefore(dragging, afterElement);
        }
    });

    function getDragAfterElement(container, x) {
        const draggableElements = [...container.querySelectorAll('.waiting-ticket:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = x - box.left - box.width / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function buildQueueFromDOM() {
        const tickets = [...listContainer.querySelectorAll('.waiting-ticket')];
        waitingQueue = tickets.map(t => t.innerText);
        updateDisplay();
    }

    // 音声チャイム
    function playChime() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, startTime, duration) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.5, ctx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + startTime + duration);
            osc.start(ctx.currentTime + startTime); osc.stop(ctx.currentTime + startTime + duration);
        }
        playNote(659.25, 0, 0.6); playNote(523.25, 0.5, 1.0);
    }

    // キーボード操作
    document.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase() === 's') {
            document.getElementById('settingModal').style.display = 'block';
            return;
        }
        if(e.key === 'Escape') {
            document.getElementById('settingModal').style.display = 'none';
            document.getElementById('numpad').style.display = 'none';
            return;
        }
        
        if (e.key >= '0' && e.key <= '9') { inputNum(e.key); return; }
        if (e.key === 'Backspace') { inputBuffer = inputBuffer.slice(0, -1); updateDisplay(); return; }
        
        if (e.code === 'Enter' || e.code === 'ArrowUp') { e.preventDefault(); addToList(); }
        if (e.code === 'Space') {
            e.preventDefault(); 
            if (inputBuffer !== "") { callNumber(padZero(inputBuffer)); inputBuffer = ""; }
            else { callNextNumber(); }
        }
    });

    // テンキー表示切り替え
    function toggleNumpad() {
        const pad = document.getElementById('numpad');
        pad.style.display = (pad.style.display === 'block') ? 'none' : 'block';
    }

    // フローティングテンキーのドラッグ移動処理
    const np = document.getElementById('numpad');
    const header = document.getElementById('numpadHeader');
    header.onmousedown = (e) => {
        let shiftX = e.clientX - np.getBoundingClientRect().left;
        let shiftY = e.clientY - np.getBoundingClientRect().top;
        function moveAt(pageX, pageY) { np.style.left = pageX - shiftX + 'px'; np.style.top = pageY - shiftY + 'px'; }
        function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
        document.addEventListener('mousemove', onMouseMove);
        document.onmouseup = () => { document.removeEventListener('mousemove', onMouseMove); };
    };
    header.ondragstart = () => false;

    // 初回起動
    applyConfig();
</script>
</body>
</html>
