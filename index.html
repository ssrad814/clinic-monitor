<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>呼び出しシステム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; user-select: none; }
        .main-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .current-call-area { flex: 1; background-color: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .current-number { font-size: 120px; font-weight: bold; color: #e74c3c; margin: 0; }
        
        .waiting-list-area { background-color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 200px; }
        .waiting-ticket { background-color: #ecf0f1; color: #2c3e50; font-size: 24px; font-weight: bold; padding: 15px; border-radius: 8px; cursor: move; display: inline-block; margin: 10px; border: 2px solid #bdc3c7; }
        
        /* フローティングテンキー */
        #numpad { display: none; position: fixed; top: 100px; left: 100px; background: rgba(255,255,255,0.95); padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 3000; cursor: grab; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 50px); gap: 8px; }
        .numpad button { height: 45px; border: none; border-radius: 6px; background: #95a5a6; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="current-call-area">
        <div class="title">ただいまのお呼出番号</div>
        <div class="current-number" id="currentNumber">000</div>
        <button onclick="returnToQueue()">呼び出しをリストに戻す</button>
    </div>
</div>

<div class="waiting-list-area" id="waitingList"></div>

<div class="hidden-trigger" style="position:fixed; top:0; right:0; width:100px; height:100px;" ondblclick="toggleNumpad()"></div>

<div id="numpad">
    <div class="numpad-grid">
        <button onclick="inputNum('1')">1</button><button onclick="inputNum('2')">2</button><button onclick="inputNum('3')">3</button>
        <button onclick="inputNum('4')">4</button><button onclick="inputNum('5')">5</button><button onclick="inputNum('6')">6</button>
        <button onclick="inputNum('7')">7</button><button onclick="inputNum('8')">8</button><button onclick="inputNum('9')">9</button>
        <button onclick="inputNum('0')">0</button>
        <button onclick="clearBuffer()" style="background:#e74c3c;">C</button>
        <button onclick="addToList()" style="background:#2ecc71;">追加</button>
        <button onclick="deleteFromList()" style="background:#95a5a6;">削除</button>
    </div>
</div>

<script>
    let waitingQueue = [];
    let inputBuffer = "";
    let currentCall = "000";

    // 3桁補完処理
    function formatNum(n) { return n.toString().padStart(3, '0'); }

    function inputNum(n) { 
        inputBuffer = (inputBuffer + n).slice(-3);
        updateDisplay();
    }
    
    function addToList() {
        if(inputBuffer.length === 3) {
            waitingQueue.push(inputBuffer);
            inputBuffer = "";
            updateDisplay();
        }
    }

    function deleteFromList() {
        waitingQueue = waitingQueue.filter(n => n !== inputBuffer);
        inputBuffer = "";
        updateDisplay();
    }

    function returnToQueue() {
        waitingQueue.unshift(currentCall);
        currentCall = "000";
        document.getElementById('currentNumber').innerText = currentCall;
        updateDisplay();
    }

    function callNumber(num) {
        currentCall = num;
        document.getElementById('currentNumber').innerText = currentCall;
        waitingQueue = waitingQueue.filter(n => n !== num);
        updateDisplay();
    }

    function updateDisplay() {
        const list = document.getElementById('waitingList');
        list.innerHTML = '<h3>お待ちの番号（ドラッグで並び替え可）</h3>';
        waitingQueue.forEach(num => {
            const el = document.createElement('div');
            el.className = 'waiting-ticket';
            el.innerText = num;
            el.draggable = true;
            el.onclick = () => callNumber(num);
            list.appendChild(el);
        });
    }

    // ドラッグ＆ドロップ並び替えロジック
    let dragSrcEl = null;
    document.addEventListener('dragstart', (e) => { dragSrcEl = e.target; });
    document.addEventListener('dragover', (e) => { e.preventDefault(); });
    document.addEventListener('drop', (e) => {
        if(e.target.className === 'waiting-ticket') {
            const all = Array.from(document.querySelectorAll('.waiting-ticket'));
            const from = all.indexOf(dragSrcEl);
            const to = all.indexOf(e.target);
            const val = waitingQueue.splice(from, 1)[0];
            waitingQueue.splice(to, 0, val);
            updateDisplay();
        }
    });

    // テンキー移動処理
    const np = document.getElementById('numpad');
    np.onmousedown = (e) => {
        let shiftX = e.clientX - np.getBoundingClientRect().left;
        let shiftY = e.clientY - np.getBoundingClientRect().top;
        document.onmousemove = (e) => { np.style.left = e.pageX - shiftX + 'px'; np.style.top = e.pageY - shiftY + 'px'; };
        document.onmouseup = () => { document.onmousemove = null; };
    };

    function toggleNumpad() { np.style.display = (np.style.display === 'block') ? 'none' : 'block'; }
    function clearBuffer() { inputBuffer = ""; updateDisplay(); }
</script>
</body>
</html>
