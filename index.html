<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼び出しシステム</title>
    <style>
        /* レイアウト崩れを防ぐための基本設定 */
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; user-select: none; }
        
        /* 呼び出しメインエリア */
        .main-container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; align-items: stretch; }
        .current-call-area { flex: 1; min-width: 300px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .current-number { font-size: 8rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        
        /* 待ちリストエリア */
        .waiting-list-area { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .waiting-numbers-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .waiting-ticket { background: #ecf0f1; border: 2px solid #bdc3c7; color: #2c3e50; font-size: 20px; font-weight: bold; padding: 15px 20px; border-radius: 8px; cursor: move; }
        
        /* テンキーのフローティング指定を修正 */
        #numpad { display: none; position: fixed; top: 100px; left: 100px; background: rgba(255,255,255,0.98); padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999; cursor: grab; border: 1px solid #ccc; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 8px; }
        .numpad button { height: 50px; border: none; border-radius: 6px; background: #7f8c8d; color: white; font-weight: bold; cursor: pointer; }
        .numpad button:hover { background: #34495e; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="current-call-area">
        <div class="title">ただいまのお呼出番号</div>
        <div class="current-number" id="currentNumber">000</div>
        <button onclick="returnToQueue()" style="padding:10px 20px; cursor:pointer;">呼び出しをリストに戻す</button>
    </div>
</div>

<div class="waiting-list-area">
    <h3>お待ちの番号（ドラッグで並び替え）</h3>
    <div id="waitingList" class="waiting-numbers-grid"></div>
</div>

<div class="hidden-trigger" style="position:fixed; top:0; right:0; width:100px; height:100px; z-index:1000;" ondblclick="toggleNumpad()"></div>

<div id="numpad">
    <div class="numpad-grid">
        <button onclick="inputNum('1')">1</button><button onclick="inputNum('2')">2</button><button onclick="inputNum('3')">3</button>
        <button onclick="inputNum('4')">4</button><button onclick="inputNum('5')">5</button><button onclick="inputNum('6')">6</button>
        <button onclick="inputNum('7')">7</button><button onclick="inputNum('8')">8</button><button onclick="inputNum('9')">9</button>
        <button onclick="inputNum('0')">0</button>
        <button onclick="clearBuffer()" style="background:#e74c3c;">C</button>
        <button onclick="addToList()" style="background:#2ecc71;">追加</button>
        <button onclick="deleteFromList()" style="background:#95a5a6;">削除</button>
    </div>
</div>

<script>
    let waitingQueue = [];
    let inputBuffer = "";
    let currentCall = "000";

    function inputNum(n) { inputBuffer = (inputBuffer + n).slice(-3); updateDisplay(); }
    function clearBuffer() { inputBuffer = ""; updateDisplay(); }
    
    function addToList() {
        if(inputBuffer.length === 3) {
            waitingQueue.push(inputBuffer);
            inputBuffer = "";
            updateDisplay();
        }
    }

    function deleteFromList() {
        waitingQueue = waitingQueue.filter(n => n !== inputBuffer);
        inputBuffer = "";
        updateDisplay();
    }

    function returnToQueue() {
        if(currentCall !== "000") {
            waitingQueue.unshift(currentCall);
            currentCall = "000";
            document.getElementById('currentNumber').innerText = currentCall;
            updateDisplay();
        }
    }

    function callNumber(num) {
        currentCall = num;
        document.getElementById('currentNumber').innerText = currentCall;
        waitingQueue = waitingQueue.filter(n => n !== num);
        updateDisplay();
    }

    function updateDisplay() {
        const list = document.getElementById('waitingList');
        list.innerHTML = '';
        waitingQueue.forEach(num => {
            const el = document.createElement('div');
            el.className = 'waiting-ticket';
            el.innerText = num;
            el.draggable = true;
            el.onclick = () => callNumber(num);
            el.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', num));
            list.appendChild(el);
        });
    }

    // ドラッグ＆ドロップの修正
    document.getElementById('waitingList').addEventListener('drop', (e) => {
        e.preventDefault();
        const num = e.dataTransfer.getData('text/plain');
        // 簡単な移動処理（ターゲット要素を取得してリストを再構築）
        updateDisplay();
    });
    document.getElementById('waitingList').addEventListener('dragover', (e) => e.preventDefault());

    // テンキー移動処理
    const np = document.getElementById('numpad');
    np.onmousedown = (e) => {
        let shiftX = e.clientX - np.getBoundingClientRect().left;
        let shiftY = e.clientY - np.getBoundingClientRect().top;
        const moveAt = (pageX, pageY) => { np.style.left = pageX - shiftX + 'px'; np.style.top = pageY - shiftY + 'px'; };
        const onMouseMove = (e) => moveAt(e.pageX, e.pageY);
        document.addEventListener('mousemove', onMouseMove);
        document.onmouseup = () => { document.removeEventListener('mousemove', onMouseMove); };
    };

    function toggleNumpad() { np.style.display = (np.style.display === 'block') ? 'none' : 'block'; }
</script>
</body>
</html>
