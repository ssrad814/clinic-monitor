<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クリニック呼び出しシステム</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        
        /* レイアウト全体 */
        .header-area { display: flex; gap: 20px; margin-bottom: 20px; }
        .current-call-area { flex: 2; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .info-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .info-box { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        .current-number { font-size: 80px; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        
        .waiting-list-area { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 150px; }
        .waiting-numbers-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .waiting-ticket { background: #ecf0f1; border: 2px solid #bdc3c7; padding: 10px 20px; border-radius: 8px; cursor: move; font-weight: bold; }
        
        /* フローティングテンキー */
        #numpad { display: none; position: fixed; top: 100px; left: 100px; background: #fff; padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 9999; cursor: move; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 50px); gap: 8px; }
        .numpad button { height: 45px; border: none; border-radius: 6px; background: #95a5a6; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-area">
    <div class="current-call-area">
        <div class="title">ただいまのお呼出番号</div>
        <div class="current-number" id="currentNumber">000</div>
        <button onclick="returnToQueue()">呼び出しをリストに戻す</button>
    </div>
    <div class="info-panel">
        <div class="info-box">お知らせ: 待合室でお待ちください</div>
        <div class="info-box">およその待ち時間: <span id="waitTime">0</span> 分</div>
    </div>
</div>

<div class="waiting-list-area">
    <h3>お待ちの番号</h3>
    <div id="waitingList" class="waiting-numbers-grid"></div>
</div>

<div style="position:fixed; top:0; right:0; width:100px; height:100px; z-index:1000;" ondblclick="toggleNumpad()"></div>

<div id="numpad">
    <div class="numpad-grid">
        <button onclick="inputNum('1')">1</button><button onclick="inputNum('2')">2</button><button onclick="inputNum('3')">3</button>
        <button onclick="inputNum('4')">4</button><button onclick="inputNum('5')">5</button><button onclick="inputNum('6')">6</button>
        <button onclick="inputNum('7')">7</button><button onclick="inputNum('8')">8</button><button onclick="inputNum('9')">9</button>
        <button onclick="inputNum('0')">0</button>
        <button onclick="clearBuffer()" style="background:#e74c3c;">C</button>
        <button onclick="addToList()" style="background:#2ecc71;">追加</button>
        <button onclick="deleteFromList()" style="background:#95a5a6;">削除</button>
    </div>
</div>

<script>
    let waitingQueue = [];
    let inputBuffer = "";
    let currentCall = "000";

    function inputNum(n) { inputBuffer = (inputBuffer + n).slice(-3); }
    function clearBuffer() { inputBuffer = ""; }
    
    function addToList() {
        if(inputBuffer.length === 3) {
            waitingQueue.push(inputBuffer);
            inputBuffer = "";
            updateDisplay();
        }
    }

    function deleteFromList() {
        waitingQueue = waitingQueue.filter(n => n !== inputBuffer);
        inputBuffer = "";
        updateDisplay();
    }

    function returnToQueue() {
        if(currentCall !== "000") {
            waitingQueue.unshift(currentCall);
            currentCall = "000";
            document.getElementById('currentNumber').innerText = currentCall;
            updateDisplay();
        }
    }

    function callNumber(num) {
        currentCall = num;
        document.getElementById('currentNumber').innerText = currentCall;
        waitingQueue = waitingQueue.filter(n => n !== num);
        updateDisplay();
    }

    function updateDisplay() {
        const list = document.getElementById('waitingList');
        list.innerHTML = '';
        waitingQueue.forEach(num => {
            const el = document.createElement('div');
            el.className = 'waiting-ticket';
            el.innerText = num;
            el.onclick = () => callNumber(num);
            list.appendChild(el);
        });
        document.getElementById('waitTime').innerText = waitingQueue.length * 5;
    }

    // フローティング・ドラッグ処理
    const np = document.getElementById('numpad');
    np.onmousedown = (e) => {
        let shiftX = e.clientX - np.getBoundingClientRect().left;
        let shiftY = e.clientY - np.getBoundingClientRect().top;
        const moveAt = (pageX, pageY) => { np.style.left = pageX - shiftX + 'px'; np.style.top = pageY - shiftY + 'px'; };
        const onMouseMove = (e) => moveAt(e.pageX, e.pageY);
        document.addEventListener('mousemove', onMouseMove);
        document.onmouseup = () => { document.removeEventListener('mousemove', onMouseMove); };
    };

    function toggleNumpad() { np.style.display = (np.style.display === 'block') ? 'none' : 'block'; }
</script>
</body>
</html>
