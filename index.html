<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼び出しシステム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .main-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .current-call-area { flex: 1; background-color: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .title { font-size: 24px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; }
        .current-number { font-size: 120px; font-weight: bold; color: #e74c3c; margin: 0; line-height: 1.2; }
        .info-area { width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .message-box, .wait-time-box { background-color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; flex: 1; }
        .message-text { font-size: 22px; font-weight: bold; color: #2c3e50; }
        .wait-time { font-size: 40px; font-weight: bold; color: #2980b9; margin: 10px 0 0 0; }
        .waiting-list-area { background-color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .waiting-numbers { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; min-height: 80px; }
        .waiting-ticket { background-color: #ecf0f1; color: #2c3e50; font-size: 30px; font-weight: bold; padding: 15px 30px; border-radius: 8px; cursor: pointer; border: 2px solid #bdc3c7; }
        .waiting-ticket:hover { background-color: #3498db; color: white; transform: scale(1.05); }
        .marquee-area { background-color: #34495e; color: white; padding: 15px; font-size: 24px; border-radius: 8px; }
        .typing-indicator { position: fixed; bottom: 18px; right: 20px; color: rgba(255, 255, 255, 0.4); font-size: 18px; font-weight: bold; }
        
        /* 設定画面用モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 400px; border-radius: 16px; }
        .setting-item { margin-bottom: 20px; }
        .setting-item input { width: 100%; padding: 8px; font-size: 16px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="current-call-area">
        <div class="title">ただいまのお呼出番号</div>
        <div class="current-number" id="currentNumber">-- 番</div>
    </div>
    <div class="info-area">
        <div class="message-box">
            <p class="title">お知らせ</p>
            <p class="message-text" id="displayMsg">待合室でお待ちください</p>
        </div>
        <div class="wait-time-box">
            <p class="title">およその待ち時間</p>
            <p class="wait-time"><span id="waitTime">0</span> 分</p>
        </div>
    </div>
</div>

<div class="waiting-list-area">
    <div class="title">お待ちの番号（タッチで呼び出し）</div>
    <div class="waiting-numbers" id="waitingList"></div>
</div>

<div class="marquee-area">
    <marquee id="marqueeText">まつい整形外科せぼね・関節クリニックへようこそ。</marquee>
</div>

<div id="settingModal" class="modal">
    <div class="modal-content">
        <h2>設定画面 (Escで閉じる)</h2>
        <div class="setting-item">
            <label>1人あたりの待ち時間(分):</label>
            <input type="number" id="inputWaitTime" value="5">
        </div>
        <div class="setting-item">
            <label>テロップ内容:</label>
            <input type="text" id="inputMarquee" value="まつい整形外科せぼね・関節クリニックへようこそ。">
        </div>
        <button onclick="saveSettings()">設定を保存して閉じる</button>
    </div>
</div>

<div id="typingIndicator" class="typing-indicator"></div>

<script>
    let waitingQueue = [];
    let inputBuffer = "";
    // 初期設定を読み込み
    let config = JSON.parse(localStorage.getItem('clinicConfig')) || { time: 5, marquee: "まつい整形外科せぼね・関節クリニックへようこそ。" };

    function applyConfig() {
        document.getElementById('marqueeText').innerText = config.marquee;
        document.getElementById('inputWaitTime').value = config.time;
        document.getElementById('inputMarquee').value = config.marquee;
        updateDisplay();
    }

    function saveSettings() {
        config.time = document.getElementById('inputWaitTime').value;
        config.marquee = document.getElementById('inputMarquee').value;
        localStorage.setItem('clinicConfig', JSON.stringify(config));
        applyConfig();
        document.getElementById('settingModal').style.display = 'none';
    }

    function updateDisplay() {
        const waitingListContainer = document.getElementById('waitingList');
        waitingListContainer.innerHTML = '';
        waitingQueue.forEach(num => {
            const ticket = document.createElement('div');
            ticket.className = 'waiting-ticket';
            ticket.innerText = num;
            ticket.onclick = () => callNumber(num);
            waitingListContainer.appendChild(ticket);
        });
        document.getElementById('waitTime').innerText = waitingQueue.length * config.time;
        document.getElementById('typingIndicator').innerText = inputBuffer !== "" ? "入力中: " + inputBuffer : "";
    }

    function playChime() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, startTime, duration) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.5, ctx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + startTime + duration);
            osc.start(ctx.currentTime + startTime); osc.stop(ctx.currentTime + startTime + duration);
        }
        playNote(659.25, 0, 0.6); playNote(523.25, 0.5, 1.0);
    }

    function callNumber(numToCall) {
        document.getElementById('currentNumber').innerText = numToCall + " 番";
        waitingQueue = waitingQueue.filter(num => num.toString() !== numToCall.toString());
        playChime();
        updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 's') document.getElementById('settingModal').style.display = 'block';
        if(e.key === 'Escape') document.getElementById('settingModal').style.display = 'none';
        
        if (e.key >= '0' && e.key <= '9') { inputBuffer += e.key; updateDisplay(); }
        if (e.key === 'Backspace') { inputBuffer = inputBuffer.slice(0, -1); updateDisplay(); }
        if (e.code === 'Enter' || e.code === 'ArrowUp') { 
            if (inputBuffer !== "") { waitingQueue.push(inputBuffer); inputBuffer = ""; updateDisplay(); }
        }
        if (e.code === 'Space') {
            if (inputBuffer !== "") { callNumber(inputBuffer); inputBuffer = ""; }
            else if (waitingQueue.length > 0) { callNumber(waitingQueue[0]); }
        }
    });

    applyConfig();
</script>
</body>
</html>
